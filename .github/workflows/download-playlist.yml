name: Download Playlist

on:
  workflow_dispatch:
    inputs:
      playlist_url:
        description: "URL de la playlist de YouTube"
        required: true
        type: string
      format:
        description: "Formato de audio"
        required: true
        type: choice
        options:
          - mp3
          - m4a
          - flac
        default: mp3
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write

jobs:
  download:
    if: |
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.event.issue.title, '[DOWNLOAD]')
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Resolver URL y formato
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "url=${{ github.event.inputs.playlist_url }}" >> "$GITHUB_OUTPUT"
            echo "format=${{ github.event.inputs.format }}" >> "$GITHUB_OUTPUT"
          else
            TITLE="${{ github.event.issue.title }}"
            URL="${TITLE#\[DOWNLOAD\] }"
            echo "url=$URL" >> "$GITHUB_OUTPUT"
            BODY="${{ github.event.issue.body }}"
            FORMAT=$(echo "$BODY" | grep 'format:' | head -1 | cut -d: -f2 | tr -d ' \r\n')
            FORMAT=${FORMAT:-mp3}
            echo "format=$FORMAT" >> "$GITHUB_OUTPUT"
            echo "issue_number=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Validar URL
        run: |
          URL="${{ steps.meta.outputs.url }}"
          if [[ ! "$URL" =~ list= ]]; then
            echo "URL invalida: debe ser una playlist con list="
            exit 1
          fi

      - name: Instalar dependencias
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          pip install yt-dlp

      - name: Descargar playlist
        run: |
          mkdir -p output
          yt-dlp \
            --ignore-errors \
            --no-overwrites \
            --embed-metadata \
            --embed-thumbnail \
            --convert-thumbnails jpg \
            -x --audio-format "${{ steps.meta.outputs.format }}" --audio-quality 0 \
            --postprocessor-args "ffmpeg:-c:v mjpeg -disposition:v:0 attached_pic" \
            -o "output/%(playlist_index)03d - %(title)s.%(ext)s" \
            "${{ steps.meta.outputs.url }}"

      - name: Empaquetar
        run: |
          cd output
          COUNT=$(find . -type f | wc -l)
          echo "files=$COUNT" >> "$GITHUB_ENV"
          if [ "$COUNT" -eq 0 ]; then
            echo "No se descargo ningun archivo"
            exit 1
          fi
          zip -r ../playlist.zip .

      - name: Subir artefacto
        uses: actions/upload-artifact@v4
        with:
          name: playlist-${{ steps.meta.outputs.format }}-${{ github.run_number }}
          path: playlist.zip
          retention-days: 7

      - name: Comentar en el issue
        if: steps.meta.outputs.issue_number != ''
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              '✅ **Descarga completada**',
              '',
              `Archivos: ${process.env.files}`,
              `Formato: ${{ steps.meta.outputs.format }}`,
              '',
              `📦 **Descargá el ZIP** desde este run de Actions:`,
              runUrl,
              '',
              'En la pagina del run, bajá hasta **Artifacts** y descargá el archivo `.zip`.',
              '',
              '_El archivo se elimina automaticamente en 7 dias._'
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.meta.outputs.issue_number }},
              body
            });

      - name: Cerrar issue
        if: steps.meta.outputs.issue_number != '' && success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.meta.outputs.issue_number }},
              state: 'closed'
            });
